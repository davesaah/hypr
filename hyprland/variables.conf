# Default variables
# Copy these to ~/.config/hypr/custom/variables.conf to make changes in a dotfiles-update-friendly manner

# Apps
# PULL REQUESTS ADDING MORE WILL NOT BE ACCEPTED, CONFIG FOR YOURSELF
$terminal = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1"
$fileManager = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "thunar"
$browser = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "firefox"
$codeEditor = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "zed" "zeditor"
$officeSoftware = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "flatpak run org.libreoffice.LibreOffice"
$textEditor = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "nvim"
$volumeMixer = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol"
$settingsApp = XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml"
$taskManager = ~/.config/hypr/hyprland/scripts/launch_first_available.sh "command -v btop && kitty -1 fish -c btop"

# The folder within ~/.config/quickshell containing the config
$qsConfig = ii

# Leave blank like this to load default config. Set to anything to not.
$dontLoadDefaultExecs =
$dontLoadDefaultGeneral =
$dontLoadDefaultRules =
$dontLoadDefaultKeybinds =
